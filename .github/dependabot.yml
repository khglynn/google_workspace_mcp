# Fleet ops layer (khglynn) — replaces upstream's unfilled template stub.
# Dependency hygiene per the dependency-security guide: grouped minor/patch,
# weekly cadence; the actions ecosystem keeps our SHA-pinned actions fresh.
# Majors are never auto-merged — human eyes always.
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
    labels: ["fleet-deps"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["fleet-deps"]
