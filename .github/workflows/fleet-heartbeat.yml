# Fleet ops: weekly proof-of-life. Solves two failure modes at once:
# (1) "silence = working?" — the off-laptop primer's contract that 'nothing to
#     do' must be distinguishable from 'we didn't check';
# (2) GitHub disables scheduled workflows in public repos after 60 days of NO
#     repo activity — the heartbeat COMMIT is the keepalive.
name: fleet-heartbeat
on:
  schedule:
    - cron: "23 15 * * 1" # Mondays, 10:23 CT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compute state + commit heartbeat
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
          FLEET_PAT: ${{ secrets.FLEET_PAT }}
        run: |
          latest=$(gh api repos/taylorwilsdon/google_workspace_mcp/releases/latest -q .tag_name | tr -cd 'A-Za-z0-9._-')
          current="v$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)".*/\1/')"
          open_syncs=$(gh pr list --repo "$GITHUB_REPOSITORY" --label fleet-sync --state open --json number -q length)

          # FLEET_PAT expiry watch: an expired PAT means sync PRs stop
          # triggering CI *silently* — the heartbeat is the only thing that
          # can see it coming. Warn at <30 days, shout if already dead.
          pat_note=""
          if [ -n "$FLEET_PAT" ]; then
            exp=$(curl -sS -o /dev/null -D - -H "Authorization: Bearer $FLEET_PAT" \
                  "https://api.github.com/repos/$GITHUB_REPOSITORY" \
                  | tr -d '\r' | awk -F': ' 'tolower($1)=="github-authentication-token-expiration"{print $2}')
            if [ -z "$exp" ]; then
              pat_note=" ⚠️ FLEET_PAT INVALID/EXPIRED — sync PRs will not run CI"
            else
              days=$(( ( $(date -u -d "$(echo "$exp" | sed 's/ UTC//')" +%s) - $(date -u +%s) ) / 86400 ))
              [ "$days" -lt 30 ] && pat_note=" ⚠️ FLEET_PAT expires in ${days}d ($exp) — rotate it"
            fi
          else
            pat_note=" ⚠️ FLEET_PAT not configured"
          fi

          msg="heartbeat: $(date -u +%Y-%m-%d) — pinned $current, upstream $latest, open sync PRs: $open_syncs$pat_note"
          echo "msg=$msg" >> "$GITHUB_OUTPUT"
          mkdir -p .fleet
          echo "$msg" >> .fleet/heartbeat.log
          tail -60 .fleet/heartbeat.log > .fleet/heartbeat.tmp && mv .fleet/heartbeat.tmp .fleet/heartbeat.log
          git config user.name "fleet-heartbeat"
          git config user.email "noreply@github.com"
          git add .fleet/heartbeat.log
          git commit -m "$msg [skip ci]"
          git push
      - name: Notify Slack
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          MSG: ${{ steps.state.outputs.msg }}
        run: |
          [ -z "$WEBHOOK" ] && { echo "no webhook configured; skipping"; exit 0; }
          curl -sS -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\"💓 $MSG\"}" "$WEBHOOK"
